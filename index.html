<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NeuralAI · Chat + Vision + Gambar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, system-ui, sans-serif;
            background: #0f0f13;
            color: #ececf0;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* ========= SIDEBAR KIRI (bisa disembunyikan) ========= */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: #0a0a0e;
            border-right: 1px solid #2a2a30;
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            gap: 20px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 200;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        /* Overlay saat sidebar terbuka (untuk mobile) */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 150;
            display: none;
        }
        .sidebar-overlay.show {
            display: block;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
        }
        .brand-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
        }
        .close-sidebar-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #aaa;
            cursor: pointer;
            padding: 6px;
        }

        .gradient { background: linear-gradient(135deg, #c084fc, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .new-chat-btn {
            background: #2a2a30;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: #3a3a42; }

        .history-area {
            flex: 1;
            overflow-y: auto;
        }
        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            color: #a0a0a8;
            font-size: 0.85rem;
            cursor: pointer;
            margin: 2px 0;
        }
        .history-item:hover { background: #1a1a20; }

        .sidebar-footer {
            border-top: 1px solid #2a2a30;
            padding-top: 12px;
            font-size: 0.7rem;
            color: #666;
            text-align: center;
        }

        /* ========= MAIN CHAT AREA ========= */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #121216;
            position: relative;
            width: 100%;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a30;
            background: #121216;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #ccc;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-toggle:hover { background: #2a2a30; }
        .chat-header h2 { font-size: 1rem; font-weight: 500; opacity: 0.8; }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* WELCOME SCREEN - di tengah sebelum chat */
        .welcome-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 10;
        }

        .welcome-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .welcome-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4f46e5, #c084fc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            margin: 0 auto 24px;
            box-shadow: 0 12px 30px #4f46e570;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .welcome-screen h2 {
            font-size: 1.8rem;
            background: linear-gradient(115deg, #f0f3ff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .welcome-screen p {
            color: #a0a0b0;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .feature-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .feature-chips span {
            background: rgba(108, 92, 231, 0.2);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid rgba(108, 92, 231, 0.3);
        }

        /* Chat Bubbles */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot { align-self: flex-start; }

        .avatar {
            width: 36px;
            height: 36px;
            background: #2a2a30;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .message.user .avatar { background: #6c5ce7; }
        .message.bot .avatar { background: #1f5e4b; }

        .bubble {
            background: #1e1e24;
            padding: 10px 16px;
            border-radius: 20px;
            line-height: 1.45;
            font-size: 0.9rem;
        }
        .message.user .bubble { background: #6c5ce7; }

        .chat-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        /* Animasi Typing */
        .typing-bubble {
            background: #1e1e24;
            padding: 14px 18px;
            border-radius: 20px;
            display: inline-flex;
            gap: 5px;
            align-items: center;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #a0a0b0;
            border-radius: 50%;
            animation: typingAnim 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingAnim {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input Area */
        .input-container {
            padding: 16px 20px 24px;
            background: #121216;
            border-top: 1px solid #2a2a30;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1e1e24;
            border-radius: 32px;
            padding: 6px 8px 6px 16px;
            border: 1px solid #3a3a42;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #aaa;
            padding: 6px;
            border-radius: 50%;
        }
        .menu-btn:hover { background: #2a2a30; color: white; }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
            padding: 10px 0;
            outline: none;
            max-height: 120px;
        }

        .attach-btn, .send-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #aaa;
            padding: 8px;
            border-radius: 50%;
        }
        .send-btn { background: #6c5ce7; color: white; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; padding: 0; }
        .send-btn:active { transform: scale(0.95); }

        /* Dropdown Menu */
        .dropdown-menu {
            position: fixed;
            bottom: 90px;
            left: 30px;
            background: #1e1e28;
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            border: 1px solid #4a4a58;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .dropdown-menu button {
            background: transparent;
            border: none;
            padding: 10px 20px;
            border-radius: 14px;
            color: white;
            text-align: left;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dropdown-menu button:hover { background: #2a2a38; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .messages-area::-webkit-scrollbar { width: 5px; }
        .messages-area::-webkit-scrollbar-track { background: #1e1e24; }
        .messages-area::-webkit-scrollbar-thumb { background: #6c5ce7; border-radius: 10px; }

        #hiddenFileInput { display: none; }

        @media (max-width: 768px) {
            .message { max-width: 95%; }
            .feature-chips span { font-size: 0.7rem; padding: 6px 12px; }
            .welcome-screen h2 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Overlay -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
        <div class="brand">
            <div class="brand-left">
                <span>🧠</span>
                <span>Neural<span class="gradient">AI</span></span>
            </div>
            <button id="closeSidebarBtn" class="close-sidebar-btn">✕</button>
        </div>
        <button id="newChatSidebarBtn" class="new-chat-btn">+ New Chat</button>
        <div class="history-area" id="historyArea">
            <div class="history-item">💬 Cara membuat website</div>
            <div class="history-item">🎨 Generate gambar kucing</div>
        </div>
        <div class="sidebar-footer">
            <span>⚡ Groq + Pollinations</span>
        </div>
    </div>

    <!-- MAIN CHAT -->
    <div class="main-chat">
        <div class="chat-header">
            <button id="openSidebarBtn" class="menu-toggle">☰</button>
            <h2>NeuralAI Assistant</h2>
        </div>

        <div class="messages-area" id="messagesArea">
            <div id="welcomeScreen" class="welcome-screen">
                <div class="welcome-logo">🧠</div>
                <h2>NeuralAI Assistant</h2>
                <p>Halo! Aku NeuralAI. Kamu bisa:</p>
                <div class="feature-chips">
                    <span>📝 Chat biasa</span>
                    <span>🎨 Generate gambar</span>
                    <span>📸 Upload foto & tanya AI</span>
                </div>
                <p style="margin-top: 16px; font-size: 0.8rem;">Coba upload foto atau tulis prompt!</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <button id="menuDropdownBtn" class="menu-btn">⋮</button>
                <textarea id="chatInput" rows="1" placeholder="Tanya apa saja..."></textarea>
                <button id="attachImageBtn" class="attach-btn">📎</button>
                <button id="sendMessageBtn" class="send-btn">➤</button>
            </div>
        </div>
    </div>
</div>

<input type="file" id="hiddenFileInput" accept="image/*">

<div id="visionDropdown" class="dropdown-menu">
    <button id="describePhotoDropdown">🔍 Deskripsikan foto terakhir</button>
    <button id="editPhotoDropdown">🎨 Edit / Transform foto</button>
    <button id="askPhotoDropdown">💬 Tanya AI tentang foto</button>
</div>

<script>
    // ========== GROQ API KEY ==========
    const GROQ_API_KEY = "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";  // Ganti dengan API key dari console.groq.com
    const POLLINATIONS_BASE = "https://image.pollinations.ai/prompt";

    // DOM Elements
    const messagesArea = document.getElementById('messagesArea');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendMessageBtn');
    const attachImageBtn = document.getElementById('attachImageBtn');
    const hiddenFileInput = document.getElementById('hiddenFileInput');
    const menuDropdownBtn = document.getElementById('menuDropdownBtn');
    const visionDropdown = document.getElementById('visionDropdown');
    const welcomeScreen = document.getElementById('welcomeScreen');
    
    // Sidebar elements
    const sidebar = document.getElementById('sidebar');
    const openSidebarBtn = document.getElementById('openSidebarBtn');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const newChatSidebarBtn = document.getElementById('newChatSidebarBtn');

    // State
    let lastUploadedImageBase64 = null;
    let conversationHistory = [];
    let isWelcomeHidden = false;

    // Sidebar functions
    function openSidebar() {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('show');
    }
    function closeSidebar() {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    }
    openSidebarBtn.addEventListener('click', openSidebar);
    closeSidebarBtn.addEventListener('click', closeSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);

    // Hide welcome screen
    function hideWelcomeScreen() {
        if (!isWelcomeHidden && welcomeScreen) {
            welcomeScreen.classList.add('hide');
            isWelcomeHidden = true;
        }
    }

    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function addMessage(role, content, imageUrl = null) {
        hideWelcomeScreen();
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        const avatar = role === 'user' ? '👤' : '🤖';
        let bubbleContent = '';
        if (imageUrl) bubbleContent += `<img src="${imageUrl}" class="chat-image" onclick="window.open(this.src)">`;
        if (content) bubbleContent += `<div>${content.replace(/\n/g, '<br>')}</div>`;
        msgDiv.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${bubbleContent}</div>`;
        messagesArea.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv;
    }

    function showTyping() {
        hideWelcomeScreen();
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="avatar">🤖</div>
            <div class="typing-bubble">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;
        messagesArea.appendChild(typingDiv);
        scrollToBottom();
    }

    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    // Chat AI
    async function callGroqChat(messages) {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
            body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: messages, temperature: 0.7, max_tokens: 800 })
        });
        if (!response.ok) throw new Error(`Groq error: ${response.status}`);
        const data = await response.json();
        return data.choices[0].message.content;
    }

    async function sendChatMessage(userText) {
        if (!userText.trim()) return;
        addMessage('user', userText);
        conversationHistory.push({ role: 'user', content: userText });
        chatInput.value = '';
        showTyping();
        try {
            const reply = await callGroqChat(conversationHistory);
            addMessage('bot', reply);
            conversationHistory.push({ role: 'assistant', content: reply });
        } catch (err) {
            addMessage('bot', `❌ Error: ${err.message}`);
        } finally {
            hideTyping();
        }
    }

    sendBtn.addEventListener('click', () => sendChatMessage(chatInput.value));
    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendChatMessage(chatInput.value);
        }
    });

    // New Chat
    function resetChat() {
        messagesArea.innerHTML = '';
        conversationHistory = [];
        isWelcomeHidden = false;
        const newWelcome = document.createElement('div');
        newWelcome.id = 'welcomeScreen';
        newWelcome.className = 'welcome-screen';
        newWelcome.innerHTML = `
            <div class="welcome-logo">🧠</div>
            <h2>NeuralAI Assistant</h2>
            <p>Halo! Aku NeuralAI. Kamu bisa:</p>
            <div class="feature-chips">
                <span>📝 Chat biasa</span>
                <span>🎨 Generate gambar</span>
                <span>📸 Upload foto & tanya AI</span>
            </div>
            <p style="margin-top: 16px; font-size: 0.8rem;">Coba upload foto atau tulis prompt!</p>
        `;
        messagesArea.appendChild(newWelcome);
        window.welcomeScreen = document.getElementById('welcomeScreen');
        scrollToBottom();
        closeSidebar();
    }
    newChatSidebarBtn.addEventListener('click', resetChat);

    // Upload gambar
    attachImageBtn.addEventListener('click', () => hiddenFileInput.click());
    hiddenFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            lastUploadedImageBase64 = ev.target.result;
            addMessage('user', `📸 Upload gambar: ${file.name}`, lastUploadedImageBase64);
            conversationHistory.push({ role: 'user', content: `[Upload gambar: ${file.name}]` });
        };
        reader.readAsDataURL(file);
        hiddenFileInput.value = '';
    });

    // Vision functions
    async function describeLastImage() {
        if (!lastUploadedImageBase64) { addMessage('bot', 'Belum ada gambar yang diupload. Klik 📎 dulu!'); return; }
        showTyping();
        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                body: JSON.stringify({ model: 'llama-3.2-11b-vision-preview', messages: [{ role: 'user', content: [{ type: 'text', text: 'Deskripsikan gambar ini secara detail dalam bahasa Indonesia.' }, { type: 'image_url', image_url: { url: lastUploadedImageBase64 } }] }], max_tokens: 500 })
            });
            const data = await res.json();
            addMessage('bot', `🔍 **Deskripsi gambar:**\n${data.choices[0].message.content}`);
        } catch (err) { addMessage('bot', `Error: ${err.message}`); }
        finally { hideTyping(); }
    }

    async function editLastImage() {
        if (!lastUploadedImageBase64) { addMessage('bot', 'Upload gambar dulu!'); return; }
        const prompt = chatInput.value.trim();
        if (!prompt) { addMessage('bot', 'Tulis prompt edit di kolom chat dulu'); return; }
        showTyping();
        const fullPrompt = `Transform this image: ${prompt}. High quality, artistic.`;
        const encoded = encodeURIComponent(fullPrompt);
        const url = `${POLLINATIONS_BASE}/${encoded}?width=1024&height=1024&nologo=true`;
        const img = new Image();
        img.onload = () => { addMessage('bot', `🎨 **Hasil edit:** ${prompt}`, url); hideTyping(); };
        img.onerror = () => { hideTyping(); addMessage('bot', 'Gagal edit gambar.'); };
        img.src = url;
    }

    async function askAboutImage() {
        if (!lastUploadedImageBase64) { addMessage('bot', 'Upload gambar dulu!'); return; }
        const question = chatInput.value.trim();
        if (!question) { addMessage('bot', 'Tulis pertanyaan tentang gambar di kolom chat.'); return; }
        showTyping();
        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                body: JSON.stringify({ model: 'llama-3.2-11b-vision-preview', messages: [{ role: 'user', content: [{ type: 'text', text: question }, { type: 'image_url', image_url: { url: lastUploadedImageBase64 } }] }], max_tokens: 500 })
            });
            const data = await res.json();
            addMessage('bot', `💬 **Jawaban:**\n${data.choices[0].message.content}`);
        } catch (err) { addMessage('bot', `Error: ${err.message}`); }
        finally { hideTyping(); }
    }

    // Dropdown menu
    menuDropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        visionDropdown.style.display = visionDropdown.style.display === 'flex' ? 'none' : 'flex';
    });
    document.addEventListener('click', (e) => {
        if (!menuDropdownBtn.contains(e.target) && !visionDropdown.contains(e.target)) {
            visionDropdown.style.display = 'none';
        }
    });
    document.getElementById('describePhotoDropdown').addEventListener('click', () => { visionDropdown.style.display = 'none'; describeLastImage(); });
    document.getElementById('editPhotoDropdown').addEventListener('click', () => { visionDropdown.style.display = 'none'; editLastImage(); });
    document.getElementById('askPhotoDropdown').addEventListener('click', () => { visionDropdown.style.display = 'none'; askAboutImage(); });

    // Generate gambar via /gambar
    async function generateImageFromPrompt(promptText) {
        if (!promptText) return null;
        const encoded = encodeURIComponent(promptText);
        return `${POLLINATIONS_BASE}/${encoded}?width=1024&height=1024&nologo=true`;
    }

    const originalSend = sendChatMessage;
    window.sendChatMessage = async (text) => {
        if (text.startsWith('/gambar ')) {
            const prompt = text.replace('/gambar ', '');
            addMessage('user', text);
            showTyping();
            const imgUrl = await generateImageFromPrompt(prompt);
            if (imgUrl) addMessage('bot', `🎨 **Gambar:** ${prompt}`, imgUrl);
            else addMessage('bot', 'Gagal generate gambar.');
            hideTyping();
        } else {
            originalSend(text);
        }
    };
    sendChatMessage = window.sendChatMessage;
    sendBtn.onclick = () => sendChatMessage(chatInput.value);
    chatInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(chatInput.value); } };
</script>
</body>
</html>
